<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loader — Ramiro Gallo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Mono:wght@400;700&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --sage:      #C8CFA8;
    --sage-dark: #8A9467;
    --sage-deep: #5C6B3A;
    --forest:    #2D3B1E;
    --cream:     #F2F0E6;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: var(--forest); font-family: 'Instrument Sans', sans-serif; overflow-x: hidden; }

  /* ══ LOADER ══════════════════════════════════════════════
     position:fixed, tres capas absolutas:
       .loader-name   — arriba, centrado horizontalmente
       #canvas-loader — ocupa todo el espacio (inset:0), z-index:1
       .loader-bar    — abajo, centrado horizontalmente
  ══════════════════════════════════════════════════════════ */
  #loader {
    position: fixed; inset: 0; z-index: 1000;
    background: var(--forest);
    transition: opacity 0.7s cubic-bezier(0.16,1,0.3,1),
                visibility 0.7s cubic-bezier(0.16,1,0.3,1);
  }
  #loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

  /* Canvas — fullscreen, detrás de todo */
  #canvas-loader {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }

  /* Nombre — encima del canvas, arriba centrado */
  .loader-name {
    position: absolute;
    top: 48px;
    left: 50%; transform: translateX(-50%);
    z-index: 2;
    font-family: 'Space Mono', monospace;
    font-size: 12px; letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--sage);
    white-space: nowrap;
    opacity: 0;
    animation: fadeIn 0.6s ease 0.3s forwards;
  }

  /* Barra de progreso — encima del canvas, abajo centrado */
  .loader-progress {
    position: absolute;
    bottom: 48px;
    left: 50%; transform: translateX(-50%);
    z-index: 2;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    opacity: 0;
    animation: fadeIn 0.6s ease 0.5s forwards;
  }
  .loader-bar-track {
    width: 120px; height: 1px;
    background: rgba(200,207,168,0.15);
    position: relative; overflow: hidden;
  }
  .loader-bar-fill {
    position: absolute; top: 0; left: 0;
    height: 100%; width: 0%;
    background: var(--sage-dark);
    transition: width 0.1s linear;
  }
  .loader-pct {
    font-family: 'Space Mono', monospace;
    font-size: 9px; letter-spacing: 0.12em;
    color: var(--sage-dark);
  }

  @keyframes fadeIn { to { opacity: 1; } }

  /* ══ SITE ════════════════════════════════════════════════ */
  #site {
    opacity: 0; visibility: hidden;
    transition: opacity 0.9s cubic-bezier(0.16,1,0.3,1) 0.1s,
                visibility 0s linear 0s;
  }
  #site.visible { opacity: 1; visibility: visible; }

  nav {
    display: flex; align-items: center; gap: 32px;
    padding: 22px 64px;
    background: var(--cream);
    border-bottom: 1px solid rgba(90,107,58,0.1);
  }
  .nav-logo { font-weight:700; font-size:12px; letter-spacing:0.12em; text-transform:uppercase; text-decoration:underline; text-underline-offset:4px; color:var(--forest); }
  .nav-link  { font-size:11px; letter-spacing:0.1em; text-transform:uppercase; opacity:0.5; color:var(--forest); }
  .nav-lang  { margin-left:auto; font-family:'Space Mono',monospace; font-size:11px; color:var(--sage-deep); }

  .hero-section {
    background: var(--sage);
    min-height: calc(100vh - 65px);
    display: grid; grid-template-columns: 1fr 1fr; align-items: center;
    overflow: hidden;
  }
  .hero-text { padding: 80px 48px 80px 80px; }
  .hero-eyebrow {
    font-family:'Space Mono',monospace; font-size:10px; letter-spacing:0.18em; text-transform:uppercase;
    color:var(--sage-deep); margin-bottom:20px;
    opacity:0; animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.15s forwards;
  }
  .hero-h1 {
    font-family:'DM Serif Display',serif; font-size:clamp(52px,5vw,80px); line-height:1;
    color:var(--forest); margin-bottom:28px;
    opacity:0; animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
  }
  .hero-h1 em { font-style:italic; color:var(--sage-deep); }
  .hero-body {
    font-size:17px; line-height:1.7; color:var(--forest);
    max-width:420px; margin-bottom:40px;
    opacity:0; animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.45s forwards;
  }
  .hero-body a { color:var(--sage-deep); text-underline-offset:4px; }
  .hero-ctas {
    display:flex; gap:14px;
    opacity:0; animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.6s forwards;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .btn-p {
    font-family:'Space Mono',monospace; font-size:10px; letter-spacing:0.15em; text-transform:uppercase;
    padding:13px 28px; background:var(--forest); color:var(--sage);
    border:none; border-radius:2px; cursor:pointer; transition:opacity 0.2s;
  }
  .btn-p:hover { opacity:0.8; }
  .btn-o {
    font-family:'Space Mono',monospace; font-size:10px; letter-spacing:0.15em; text-transform:uppercase;
    padding:13px 28px; background:transparent; color:var(--forest);
    border:1.5px solid var(--forest); border-radius:2px; cursor:pointer;
    transition:background 0.2s, color 0.2s;
  }
  .btn-o:hover { background:var(--forest); color:var(--sage); }

  .hero-photo-wrap {
    height: calc(100vh - 65px);
    display: flex; align-items: center; justify-content: center; padding: 48px;
  }
  .hero-photo-placeholder {
    width: 100%; max-width: 420px; aspect-ratio: 3/4;
    background: var(--sage-deep); border-radius: 4px; overflow: hidden;
    position: relative;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
    opacity:0; animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
  }
  .hero-photo-placeholder::after {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(-45deg, transparent, transparent 4px, rgba(200,207,168,0.04) 4px, rgba(200,207,168,0.04) 5px);
  }
  .photo-label { font-family:'Space Mono',monospace; font-size:10px; letter-spacing:0.15em; text-transform:uppercase; color:var(--sage); opacity:0.45; z-index:1; }
  .photo-icon  { font-size:28px; opacity:0.2; color:var(--sage); z-index:1; }

  #replay-btn {
    position: fixed; bottom: 28px; right: 28px; z-index: 500;
    font-family:'Space Mono',monospace; font-size:9px; letter-spacing:0.15em; text-transform:uppercase;
    padding: 10px 18px;
    background: var(--forest); color: var(--sage-dark);
    border: 1px solid rgba(200,207,168,0.15); border-radius: 2px; cursor: pointer;
    opacity: 0; visibility: hidden;
    transition: opacity 0.4s, visibility 0.4s, color 0.2s;
  }
  #replay-btn.show { opacity: 1; visibility: visible; }
  #replay-btn:hover { color: var(--sage); }
</style>
</head>
<body>

<!-- ══ LOADER ═══════════════════════════════════════════ -->
<div id="loader">
  <canvas id="canvas-loader"></canvas>
  <div class="loader-name">Ramiro Gallo</div>
  <div class="loader-progress">
    <div class="loader-bar-track">
      <div class="loader-bar-fill" id="loader-bar"></div>
    </div>
    <div class="loader-pct" id="loader-pct">0%</div>
  </div>
</div>

<!-- ══ SITE ══════════════════════════════════════════════ -->
<div id="site">
  <nav>
    <span class="nav-logo">Ramiro Gallo</span>
    <span class="nav-link">Acerca de mí</span>
    <span class="nav-link">Trabajos</span>
    <span class="nav-link">Contacto</span>
    <span class="nav-lang">ES | EN</span>
  </nav>
  <section class="hero-section">
    <div class="hero-text">
      <div class="hero-eyebrow">Diseñador Multidisciplinar · Buenos Aires</div>
      <h1 class="hero-h1">¡Hola! <em>Bienvenido</em></h1>
      <p class="hero-body">Me llamo Ramiro. Mis intereses incluyen diseño audiovisual, diseño sonoro y desarrollo conceptual, <a href="#">entre otros.</a></p>
      <div class="hero-ctas">
        <button class="btn-p">Ver trabajos</button>
        <button class="btn-o">Contacto</button>
      </div>
    </div>
    <div class="hero-photo-wrap">
      <div class="hero-photo-placeholder">
        <div class="photo-icon">◻</div>
        <div class="photo-label">Tu foto / video acá</div>
      </div>
    </div>
  </section>
</div>

<button id="replay-btn" onclick="replayLoader()">↺ Ver loader</button>

<script>
// ════════════════════════════════════════════════════════
//  METABALL ASCII LOADER
//  Valores calibrados: threshold=2.0  coreT=4.5  midT=1.5  charPx=11
//  Layout: nombre top:48px · canvas fullscreen · barra bottom:48px
// ════════════════════════════════════════════════════════

const CFG = {
  threshold : 2.0,
  coreT     : 4.5,
  midT      : 1.5,
  charPx    : 11,
  animDur   : 3500,
  totalDur  : 4500,
};

const HOME = [
  { hx:  0.00, hy:  0.00, r: 0.190 },
  { hx: -0.30, hy: -0.25, r: 0.130 },
  { hx:  0.26, hy: -0.22, r: 0.115 },
  { hx: -0.37, hy:  0.07, r: 0.072 },
  { hx:  0.40, hy:  0.06, r: 0.052 },
  { hx: -0.20, hy:  0.30, r: 0.125 },
  { hx:  0.24, hy:  0.30, r: 0.105 },
];

function eio(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }

const canvas = document.getElementById('canvas-loader');
const ctx    = canvas.getContext('2d');
const dpr    = window.devicePixelRatio || 1;
let W, H, cols, rows, fw, fh;
let animId    = null;
let startTime = null;
let loaderDone = false;

function resize() {
  // El canvas tiene position:absolute inset:0, 
  // así que su tamaño físico = viewport
  W = canvas.width  = window.innerWidth  * dpr;
  H = canvas.height = window.innerHeight * dpr;
  fw = CFG.charPx * dpr * 0.60;
  fh = CFG.charPx * dpr;
  cols = Math.ceil(W / fw) + 1;
  rows = Math.ceil(H / fh) + 1;
}

function ballsAt(t) {
  let progress;
  if      (t < 0.38) progress = eio(t / 0.38);
  else if (t < 0.62) progress = 1.0;
  else               progress = eio(1 - (t - 0.62) / 0.38);

  const breath = (t >= 0.38 && t < 0.62)
    ? Math.sin(((t - 0.38) / 0.24) * Math.PI) * 0.022 : 0;

  // Escala basada en el viewport completo para que las bolas 
  // sean proporcionales a la pantalla y se vean grandes
  const scale = Math.min(W, H) * 0.40;

  return HOME.map(b => ({
    x: W/2 + b.hx * scale * (1 - progress),
    y: H/2 + b.hy * scale * (1 - progress),
    r: (b.r + breath) * scale,
  }));
}

function fieldToChar(v) {
  const T = CFG.threshold;
  if (v >= T * CFG.coreT) return '&';
  if (v >= T * CFG.midT)  return '#';
  if (v >= T * 1.08)      return '/';
  if (v >= T)             return '*';
  return null;
}

function frame(now) {
  if (!startTime) startTime = now;
  const elapsed = now - startTime;

  const totalPct = Math.min(1, elapsed / CFG.totalDur);
  document.getElementById('loader-bar').style.width = (totalPct * 100) + '%';
  document.getElementById('loader-pct').textContent  = Math.round(totalPct * 100) + '%';

  const animT = Math.min(1, elapsed / CFG.animDur);
  const balls  = ballsAt(animT);

  ctx.fillStyle = '#2D3B1E';
  ctx.fillRect(0, 0, W, H);
  ctx.font         = `${CFG.charPx * dpr}px 'Space Mono', monospace`;
  ctx.textBaseline = 'top';
  ctx.fillStyle    = '#C8CFA8';
  ctx.globalAlpha  = 1;

  for (let row = 0; row < rows; row++) {
    const py = row * fh;
    for (let col = 0; col < cols; col++) {
      const px = col * fw + fw * 0.5;
      const cy = py + fh * 0.5;
      let v = 0;
      for (const b of balls) {
        const dx = px - b.x, dy = cy - b.y;
        v += (b.r * b.r) / (dx*dx + dy*dy || 0.0001);
      }
      const ch = fieldToChar(v);
      if (ch) ctx.fillText(ch, col * fw, py);
    }
  }

  if (elapsed >= CFG.totalDur && !loaderDone) {
    loaderDone = true;
    document.getElementById('loader').classList.add('hidden');
    document.getElementById('site').classList.add('visible');
    setTimeout(() => {
      cancelAnimationFrame(animId);
      animId = null;
      document.getElementById('replay-btn').classList.add('show');
    }, 800);
    return;
  }

  animId = requestAnimationFrame(frame);
}

function replayLoader() {
  loaderDone = false;
  startTime  = null;
  document.getElementById('loader-bar').style.width = '0%';
  document.getElementById('loader-pct').textContent  = '0%';
  document.getElementById('loader').classList.remove('hidden');
  document.getElementById('site').classList.remove('visible');
  document.getElementById('replay-btn').classList.remove('show');
  resize();
  if (!animId) animId = requestAnimationFrame(frame);
}

window.addEventListener('load', () => {
  resize();
  window.addEventListener('resize', resize);
  animId = requestAnimationFrame(frame);
});
</script>
</body>
</html>
